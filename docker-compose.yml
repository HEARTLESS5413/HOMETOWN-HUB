version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: lokconnect-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: lokconnect

  backend:
    build: ./backend
    container_name: lokconnect-api
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/lokconnect
      - JWT_SECRET=docker-dev-secret-change-in-production
      - JWT_EXPIRES_IN=7d
      - FRONTEND_URL=http://localhost:3000
      - PORT=5000
    depends_on:
      - mongodb
    volumes:
      - ./backend/src:/app/src

  frontend:
    build: ./frontend
    container_name: lokconnect-frontend
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  mongodb_data:
